<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polk Development Tracker</title>
  <meta name="description" content="Positive development news for Polk County, Florida." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header class="hero">
      <div class="hero-bg"></div>
      <img src="images/logo.svg" class="main-logo" alt="Polk Development Tracker">

    <main>
      <section class="intro">

    <footer class="footer">
      <img src="images/logo.svg" alt="Polk Development Tracker">
      <p>Polk Development Tracker is your source for positive growth and development updates across Polk County, Florida.</p>
      <div class="foot-right">
        <p>📍 Polk County, Florida</p>

  <script src="script.js"></script>
