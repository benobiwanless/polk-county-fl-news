<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polk Development Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <img src="assets/logo.png" alt="Polk Development Tracker" class="hero-logo" />
  </header>

  <main class="page-shell">
    <section class="featured-section">
      <div class="section-heading">
        <h1>Featured Project</h1>
      </div>
      <article id="featuredProject" class="featured-card"></article>
    </section>

    <section class="news-section">
      <div class="section-heading row-heading">
        <h2>Latest Development News</h2>
        <span id="lastUpdated" class="last-updated"></span>
      </div>
      <div id="newsGrid" class="news-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <span>Tracking positive growth across Polk County, Florida</span>
    <span>Polk Development Tracker</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
